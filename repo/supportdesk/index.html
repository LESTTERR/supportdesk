<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon">
          <!-- Chat bubble icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <span>SupportDesk</span>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to your support portal</p>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email"
            placeholder="agent@company.com" required/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
            placeholder="••••••••" required/>
        </div>
        <div id="login-error" class="error-msg" style="display:none">
          Invalid email or password. Please try again.
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
      </form>

      <p class="login-hint">
        Forgot your password?
        <a href="mailto:admin@company.com">Contact administrator</a>
      </p>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
