<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk - Staff Accounts</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon logo-icon--sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <span>SupportDesk</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="tickets.html" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
          All Tickets
          <span class="nav-badge" id="open-count">-</span>
        </a>
        <a href="create-ticket.html" class="nav-item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          New Ticket
        </a>
        <a href="staff.html" class="nav-item admin-only active" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Staff
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="user-pill">
          <div class="avatar" id="user-avatar">--</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Loading...</div>
            <div class="user-role" id="user-role">Loading...</div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Sign out">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Staff Accounts</h1>
          <p class="page-sub">Create agent and admin accounts</p>
        </div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-title">Create Staff Account</div>
          <form id="staff-form" onsubmit="createStaffAccount(event)">
            <div class="field">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" placeholder="Staff Name" required/>
            </div>
            <div class="field">
              <label for="email">Email address</label>
              <input type="email" id="email" name="email" placeholder="staff@example.com" required/>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="At least 6 characters" required/>
            </div>
            <div class="field">
              <label for="role">Role</label>
              <select id="role" name="role" required>
                <option value="agent">Support Agent</option>
                <option value="admin">Administrator</option>
              </select>
            </div>
            <div id="staff-error" class="error-msg" style="display:none"></div>
            <div id="staff-success" class="success-msg" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full" id="staff-submit">Create staff account</button>
          </form>
        </div>

        <div class="ticket-table">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="staff-tbody">
              <tr><td colspan="4" class="table-loading">Loading staff...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/staff.js"></script>
</body>
</html>
