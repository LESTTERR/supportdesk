<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk - Login</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">
  <canvas id="landing-canvas" aria-hidden="true"></canvas>

  <div class="login-wrap auth-layout auth-simple">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <span>SupportDesk</span>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to your support portal</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required/>
        </div>
        <div id="login-error" class="error-msg" style="display:none">
          Invalid email or password. Please try again.
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
      </form>

      <p class="login-hint">
        Forgot your password?
        <a href="mailto:admin@company.com">Contact administrator</a>
      </p>
      <p class="login-hint">
        Don't have an account?
        <a href="register.html">Create account</a>
      </p>
      <p class="login-hint" id="first-admin-link" style="display:none">
        Setting up staff?
        <a href="setup-admin.html">Create first admin</a>
      </p>
      <p class="login-hint">
        <a href="../index.html">Back to landing page</a>
      </p>
    </div>
  </div>

  <script src="../js/landing.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
