<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk — Ticket Detail</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon logo-icon--sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <span>SupportDesk</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="tickets.html" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
          All Tickets
        </a>
        <a href="create-ticket.html" class="nav-item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          New Ticket
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="user-pill">
          <div class="avatar" id="user-avatar">--</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Loading…</div>
            <div class="user-role" id="user-role">Agent</div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Sign out">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Ticket Detail</h1>
          <p class="page-sub" id="ticket-subtitle">Loading ticket…</p>
        </div>
        <a href="tickets.html" class="btn btn-ghost">
          Back to tickets
        </a>
      </div>

      <div id="ticket-loading" class="card">
        <p class="loading-msg">Loading ticket details…</p>
      </div>

      <div id="ticket-detail" class="card" style="display:none;">
        <div class="detail-row">
          <div>
            <div class="detail-label">Ticket ID</div>
            <div id="detail-id" class="detail-value">#</div>
          </div>
          <div>
            <div class="detail-label">Status</div>
            <div id="detail-status" class="detail-value"></div>
          </div>
        </div>

        <div class="detail-row">
          <div>
            <div class="detail-label">Subject</div>
            <div id="detail-subject" class="detail-value"></div>
          </div>
          <div>
            <div class="detail-label">Priority</div>
            <div id="detail-priority" class="detail-value"></div>
          </div>
        </div>

        <div class="detail-row">
          <div>
            <div class="detail-label">Category</div>
            <div id="detail-category" class="detail-value"></div>
          </div>
          <div>
            <div class="detail-label">Created By</div>
            <div id="detail-user" class="detail-value"></div>
          </div>
        </div>

        <div class="detail-block">
          <div class="detail-label">Description</div>
          <div id="detail-description" class="detail-value detail-box"></div>
        </div>

        <div class="detail-block">
          <div class="detail-label">Attachments</div>
          <div id="detail-attachments" class="detail-value"></div>
        </div>
      </div>

      <div id="ticket-error" class="card error-msg" style="display:none;"></div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function escHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function statusBadge(status = '') {
      const map = {
        open: 'badge-open',
        resolved: 'badge-closed',
        'in_progress': 'badge-progress',
        closed: 'badge-closed'
      };
      return `<span class="badge ${map[status] || 'badge-open'}">${escHtml(status.replace('_', ' '))}</span>`;
    }

    function priorityBadge(priority = '') {
      const map = {
        low: 'badge-low',
        medium: 'badge-medium',
        high: 'badge-high',
        critical: 'badge-critical'
      };
      return `<span class="badge ${map[priority.toLowerCase()] || 'badge-medium'}">${escHtml(priority)}</span>`;
    }

    async function loadTicket() {
      const id = getQueryParam('id');
      const errorEl = document.getElementById('ticket-error');
      const loadingEl = document.getElementById('ticket-loading');
      const detailEl = document.getElementById('ticket-detail');

      if (!id) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.textContent = 'Ticket ID is missing.';
        return;
      }

      try {
        const res = await fetch(`../api/tickets.php?id=${encodeURIComponent(id)}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Ticket not found');
        }

        document.getElementById('detail-id').textContent = `#${data.id}`;
        document.getElementById('detail-status').innerHTML = statusBadge(data.status);
        document.getElementById('detail-subject').textContent = data.subject || '—';
        document.getElementById('detail-priority').innerHTML = priorityBadge(data.priority);
        document.getElementById('detail-category').textContent = data.category_name || '—';
        document.getElementById('detail-user').textContent = data.user_name || data.user_email || '—';
        document.getElementById('detail-description').textContent = data.description || '—';

        const attachmentsEl = document.getElementById('detail-attachments');
        if (data.attachments && data.attachments.length) {
          attachmentsEl.innerHTML = data.attachments.map(att => `
            <div class="attachment-item">
              <a href="../${att.file_path}" download>${escHtml(att.file_name)}</a>
              <span class="attachment-meta">${escHtml(att.mime_type || '')} ${att.file_size ? `• ${att.file_size} bytes` : ''}</span>
            </div>
          `).join('');
        } else {
          attachmentsEl.textContent = 'No attachments.';
        }

        loadingEl.style.display = 'none';
        detailEl.style.display = 'block';
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.textContent = err.message || 'Unable to load ticket details.';
      }
    }

    document.addEventListener('DOMContentLoaded', loadTicket);
  </script>
</body>
</html>
