<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk — All Tickets</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon logo-icon--sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <span>SupportDesk</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="tickets.html" class="nav-item active">
          <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
          All Tickets
          <span class="nav-badge" id="open-count">—</span>
        </a>
        <a href="create-ticket.html" class="nav-item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          New Ticket
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="user-pill">
          <div class="avatar" id="user-avatar">--</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Loading…</div>
            <div class="user-role" id="user-role">Agent</div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Sign out">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">All Tickets</h1>
          <p class="page-sub" id="ticket-summary">Loading…</p>
        </div>
        <a href="create-ticket.html" class="btn btn-ghost">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New Ticket
        </a>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Search tickets…" oninput="filterTickets()"/>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all"    onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" data-filter="open"          onclick="setFilter('open',this)">Open</button>
          <button class="filter-btn" data-filter="in progress"   onclick="setFilter('in progress',this)">In Progress</button>
          <button class="filter-btn" data-filter="closed"        onclick="setFilter('closed',this)">Closed</button>
        </div>
      </div>

      <!-- Table -->
      <div class="ticket-table">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Subject</th>
              <th>Status</th>
              <th>Priority</th>
              <th>User</th>
              <th>Assigned To</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="ticket-tbody">
            <tr><td colspan="7" class="table-loading">Loading tickets…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/tickets.js"></script>
</body>
</html>
