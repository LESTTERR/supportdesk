<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk — Register</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon">
          <!-- Chat bubble icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <span>SupportDesk</span>
      </div>

      <h1 class="login-title">Create Account</h1>
      <p class="login-sub">Join the support desk team</p>

      <!-- Registration Form -->
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name"
            placeholder="John Doe" required/>
        </div>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email"
            placeholder="agent@company.com" required/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
            placeholder="••••••••" required/>
        </div>
        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="agent">Support Agent</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
        <div id="register-error" class="error-msg" style="display:none">
          Registration failed. Please try again.
        </div>
        <div id="register-success" class="success-msg" style="display:none">
          Registration successful! Please check your email.
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <p class="login-hint">
        Already have an account?
        <a href="../index.html">Sign in</a>
      </p>

    </div>
  </div>

  <script src="../js/register.js"></script>
</body>
</html>
