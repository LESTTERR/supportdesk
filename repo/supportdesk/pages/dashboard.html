<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk — Dashboard</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon logo-icon--sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </div>
        <span>SupportDesk</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="tickets.html" class="nav-item">
          <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
          All Tickets
          <span class="nav-badge" id="open-count">—</span>
        </a>
        <a href="create-ticket.html" class="nav-item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          New Ticket
        </a>
        <a href="staff.html" class="nav-item admin-only" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Staff
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="user-pill">
          <div class="avatar" id="user-avatar">--</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Loading…</div>
            <div class="user-role" id="user-role">Loading...</div>
          </div>
          <button class="logout-btn" onclick="logout()" title="Sign out">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">Dashboard</h1>
          <p class="page-sub" id="today-date"></p>
        </div>
        <a href="create-ticket.html" class="btn btn-ghost">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New Ticket
        </a>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Open Tickets</div>
          <div class="stat-value" id="stat-open">—</div>
          <div class="stat-trend" id="stat-open-trend"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="stat-progress">—</div>
          <div class="stat-trend"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Resolved Today</div>
          <div class="stat-value" id="stat-resolved">—</div>
          <div class="stat-trend up" id="stat-resolved-trend"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Response</div>
          <div class="stat-value" id="stat-response">—</div>
          <div class="stat-trend" id="stat-response-trend"></div>
        </div>
      </div>

      <!-- Two-column panels -->
      <div class="two-col">
        <div class="card">
          <div class="card-title">Recent Tickets</div>
          <div id="recent-tickets-list">
            <p class="loading-msg">Loading…</p>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Activity Feed</div>
          <div id="activity-list">
            <p class="loading-msg">Loading…</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
